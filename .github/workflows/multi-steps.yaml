
name : multi steps 

on : [ push ]

jobs : 
  job :
    runs-on : ubuntu-latest 
    env : 
      GITHUB_BRANCH_REF : {{ github.ref }}
    steps :
      - name : step 0 checkout action 
        uses : actions/checkout@v3 

      - name : step 1 
        run : echo "hello" 
      
      - name : step 2 
        run : date 

      - name : step 3 
        run : echo "branch $GITHUB_BRANCH_REF "

      - name : 
        run : ls -a 
        
